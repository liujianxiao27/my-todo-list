<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人记账本</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 导航头部 */
        .nav-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            padding: 15px 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #5a67d8;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .nav-title {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
        }

        /* 页面整体样式 - 添加顶部间距 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 80px 20px 20px 20px; /* 顶部增加间距 */
        }

        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 页面标题 */
        .main-title {
            text-align: center;
            color: white;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 30px;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            animation: fadeInDown 0.8s ease-out;
        }

        /* 卡片基础样式 */
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            padding: 30px;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out;
        }

        /* 卡片标题 */
        .card-title {
            font-size: 24px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* 收入/支出切换按钮 */
        .type-toggle {
            display: flex;
            background: #f7fafc;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .type-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: #718096;
        }

        .type-btn.active.income {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.3);
        }

        .type-btn.active.expense {
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(245, 101, 101, 0.3);
        }

        /* 表单网格布局 */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* 添加按钮 */
        .add-btn {
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        /* 统计网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stat-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--accent-color);
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 14px;
            color: #718096;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #2d3748;
        }

        /* 不同统计项的主题色 */
        .income-stat {
            --accent-color: #48bb78;
        }

        .expense-stat {
            --accent-color: #f56565;
        }

        .balance-stat {
            --accent-color: #667eea;
        }

        /* 记录列表 */
        .records-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .record-item {
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        .record-item:hover {
            background: #f7fafc;
        }

        .record-item:last-child {
            border-bottom: none;
        }

        .record-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 15px;
        }

        .record-icon.income {
            background: linear-gradient(135deg, #c6f6d5 0%, #9ae6b4 100%);
        }

        .record-icon.expense {
            background: linear-gradient(135deg, #fed7d7 0%, #feb2b2 100%);
        }

        .record-details {
            flex: 1;
        }

        .record-description {
            font-size: 16px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 4px;
        }

        .record-category {
            font-size: 14px;
            color: #718096;
        }

        .record-amount {
            font-size: 18px;
            font-weight: 700;
        }

        .record-amount.income {
            color: #38a169;
        }

        .record-amount.expense {
            color: #e53e3e;
        }

        .record-date {
            font-size: 12px;
            color: #a0aec0;
            text-align: right;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .empty-subtext {
            font-size: 14px;
            opacity: 0.8;
        }

        /* 动画定义 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式设计 - 平板 */
        @media (max-width: 768px) {
            .main-title {
                font-size: 28px;
            }

            .card {
                padding: 25px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .record-item {
                padding: 15px;
            }
        }

        /* 响应式设计 - 手机 */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .main-title {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .card {
                padding: 20px;
                margin-bottom: 20px;
            }

            .card-title {
                font-size: 20px;
            }

            .form-input,
            .form-select {
                padding: 10px 14px;
                font-size: 14px;
            }

            .add-btn {
                padding: 12px 24px;
                font-size: 16px;
            }

            .stat-item {
                padding: 20px;
            }

            .stat-value {
                font-size: 24px;
            }

            .record-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .record-icon {
                margin-right: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 导航头部 -->
    <div class="nav-header">
        <a href="../index.html" class="back-btn">
            ← 返回主页
        </a>
        <div class="nav-title">个人记账本</div>
    </div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 页面标题 -->
        <h1 class="main-title">💰 个人记账本</h1>

        <!-- 添加记录卡片 -->
        <div class="card">
            <h2 class="card-title">
                <span>📝</span>
                添加记录
            </h2>

            <!-- 收入/支出切换 -->
            <div class="type-toggle">
                <button class="type-btn active income" id="income-btn">
                    💰 收入
                </button>
                <button class="type-btn expense" id="expense-btn">
                    💸 支出
                </button>
            </div>

            <!-- 记录表单 -->
            <form class="record-form" id="record-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="amount">金额</label>
                        <input type="number" class="form-input" id="amount" name="amount" placeholder="请输入金额" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="category">分类</label>
                        <select class="form-select" id="category" name="category" required>
                            <option value="">请选择分类</option>
                            <!-- 收入分类 -->
                            <option value="salary" class="income-option">工资</option>
                            <option value="bonus" class="income-option">奖金</option>
                            <option value="investment" class="income-option">投资收益</option>
                            <option value="other-income" class="income-option">其他收入</option>
                            <!-- 支出分类 -->
                            <option value="food" class="expense-option" style="display: none;">餐饮</option>
                            <option value="transport" class="expense-option" style="display: none;">交通</option>
                            <option value="shopping" class="expense-option" style="display: none;">购物</option>
                            <option value="entertainment" class="expense-option" style="display: none;">娱乐</option>
                            <option value="healthcare" class="expense-option" style="display: none;">医疗</option>
                            <option value="education" class="expense-option" style="display: none;">教育</option>
                            <option value="housing" class="expense-option" style="display: none;">住房</option>
                            <option value="other-expense" class="expense-option" style="display: none;">其他支出</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="description">描述</label>
                    <input type="text" class="form-input" id="description" name="description" placeholder="请输入描述信息" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="date">日期</label>
                    <input type="date" class="form-input" id="date" name="date" required>
                </div>

                <button type="submit" class="add-btn">
                    ➕ 添加记录
                </button>
                
                <!-- 调试按钮 -->
                <button type="button" class="add-btn" onclick="clearAllData()" style="background: #e53e3e; margin-top: 10px;">
                    🗑️ 清除所有数据（调试用）
                </button>
            </form>
        </div>

        <!-- 统计卡片 -->
        <div class="card">
            <h2 class="card-title">
                <span>📊</span>
                财务统计
            </h2>

            <div class="stats-grid">
                <div class="stat-item income-stat">
                    <div class="stat-icon">💰</div>
                    <div class="stat-label">总收入</div>
                    <div class="stat-value" id="total-income">¥0.00</div>
                </div>
                <div class="stat-item expense-stat">
                    <div class="stat-icon">💸</div>
                    <div class="stat-label">总支出</div>
                    <div class="stat-value" id="total-expense">¥0.00</div>
                </div>
                <div class="stat-item balance-stat">
                    <div class="stat-icon">💳</div>
                    <div class="stat-label">余额</div>
                    <div class="stat-value" id="balance">¥0.00</div>
                </div>
            </div>
        </div>

        <!-- 记录列表卡片 -->
        <div class="card">
            <h2 class="card-title">
                <span>📋</span>
                记录列表
            </h2>

            <div class="records-list" id="records-list">
                <!-- 空状态 -->
                <div class="empty-state" id="empty-state">
                    <div class="empty-icon">📝</div>
                    <div class="empty-text">还没有任何记录</div>
                    <div class="empty-subtext">开始记录你的第一笔收入或支出吧</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
    <script>
        // 获取页面元素
        const incomeBtn = document.getElementById('income-btn');
        const expenseBtn = document.getElementById('expense-btn');
        const categorySelect = document.getElementById('category');
        const recordForm = document.getElementById('record-form');
        const recordsList = document.getElementById('records-list');
        const emptyState = document.getElementById('empty-state');
        const totalIncomeElement = document.getElementById('total-income');
        const totalExpenseElement = document.getElementById('total-expense');
        const balanceElement = document.getElementById('balance');
        const dateInput = document.getElementById('date');

        // 当前记录类型（收入/支出）
        let currentType = 'income';

        // 记录数据
        let records = [];

        // 分类图标映射
        const categoryIcons = {
            // 收入分类
            'salary': '💰',
            'bonus': '🎁',
            'investment': '📈',
            'other-income': '💵',
            // 支出分类
            'food': '🍽️',
            'transport': '🚌',
            'shopping': '🛍️',
            'entertainment': '🎮',
            'healthcare': '🏥',
            'education': '📚',
            'housing': '🏠',
            'other-expense': '💸'
        };

        // 分类名称映射
        const categoryNames = {
            // 收入分类
            'salary': '工资',
            'bonus': '奖金',
            'investment': '投资收益',
            'other-income': '其他收入',
            // 支出分类
            'food': '餐饮',
            'transport': '交通',
            'shopping': '购物',
            'entertainment': '娱乐',
            'healthcare': '医疗',
            'education': '教育',
            'housing': '住房',
            'other-expense': '其他支出'
        };

        // 初始化页面
        function init() {
            // 设置默认日期为今天
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;

            // 加载保存的记录
            loadRecords();
            
            // 更新统计
            updateStats();
            
            // 更新记录列表显示
            renderRecords();
        }

        // 切换收入/支出类型
        function switchType(type) {
            currentType = type;
            
            // 更新按钮状态
            if (type === 'income') {
                incomeBtn.classList.add('active');
                expenseBtn.classList.remove('active');
            } else {
                expenseBtn.classList.add('active');
                incomeBtn.classList.remove('active');
            }
            
            // 更新分类选项
            updateCategoryOptions();
        }

        // 更新分类选项
        function updateCategoryOptions() {
            const incomeOptions = categorySelect.querySelectorAll('.income-option');
            const expenseOptions = categorySelect.querySelectorAll('.expense-option');
            
            if (currentType === 'income') {
                incomeOptions.forEach(option => option.style.display = 'block');
                expenseOptions.forEach(option => option.style.display = 'none');
            } else {
                incomeOptions.forEach(option => option.style.display = 'none');
                expenseOptions.forEach(option => option.style.display = 'block');
            }
            
            // 重置选择
            categorySelect.value = '';
        }

        // 格式化金额显示
        function formatAmount(amount) {
            return new Intl.NumberFormat('zh-CN', {
                style: 'currency',
                currency: 'CNY'
            }).format(amount);
        }

        // 添加记录
        function addRecord(formData) {
            // 获取并验证表单数据
            const amountStr = formData.get('amount');
            const amount = parseFloat(amountStr);
            const category = formData.get('category');
            const description = formData.get('description');
            const date = formData.get('date');
            
            // 调试信息
            console.log('表单数据:', {
                amountStr: amountStr,
                amount: amount,
                category: category,
                description: description,
                date: date,
                currentType: currentType
            });
            
            // 数据验证
            if (!amountStr || amountStr.trim() === '' || isNaN(amount) || amount <= 0) {
                console.log('金额验证失败:', { amountStr, amount, isNaN: isNaN(amount) });
                showToast('请输入有效的金额！');
                return false;
            }
            
            if (!category || category.trim() === '') {
                console.log('分类验证失败:', category);
                showToast('请选择分类！');
                return false;
            }
            
            if (!description || description.trim() === '') {
                console.log('描述验证失败:', description);
                showToast('请输入描述信息！');
                return false;
            }
            
            if (!date || date.trim() === '') {
                console.log('日期验证失败:', date);
                showToast('请选择日期！');
                return false;
            }
            
            const record = {
                id: Date.now(),
                type: currentType,
                amount: amount,
                category: category,
                description: description.trim(),
                date: date,
                timestamp: Date.now()
            };
            
            console.log('创建的记录:', record);
            
            records.unshift(record); // 添加到数组开头（最新的在前面）
            saveRecords();
            updateStats();
            renderRecords();
            
            // 显示成功提示
            showToast('记录添加成功！');
            return true;
        }

        // 保存记录到localStorage
        function saveRecords() {
            localStorage.setItem('ledgerRecords', JSON.stringify(records));
        }

        // 从localStorage加载记录
        function loadRecords() {
            try {
                const savedRecords = localStorage.getItem('ledgerRecords');
                if (savedRecords) {
                    const parsedRecords = JSON.parse(savedRecords);
                    // 验证数据格式
                    if (Array.isArray(parsedRecords)) {
                        records = parsedRecords.filter(record => {
                            // 过滤掉无效的记录
                            return record && 
                                   typeof record.amount === 'number' && 
                                   record.description && 
                                   record.category && 
                                   record.date && 
                                   record.type;
                        });
                    }
                }
            } catch (error) {
                console.error('加载记录失败:', error);
                // 如果数据损坏，清除localStorage
                localStorage.removeItem('ledgerRecords');
                records = [];
            }
        }

        // 更新统计数据
        function updateStats() {
            let totalIncome = 0;
            let totalExpense = 0;
            
            records.forEach(record => {
                if (record.type === 'income') {
                    totalIncome += record.amount;
                } else {
                    totalExpense += record.amount;
                }
            });
            
            const balance = totalIncome - totalExpense;
            
            totalIncomeElement.textContent = formatAmount(totalIncome);
            totalExpenseElement.textContent = formatAmount(totalExpense);
            balanceElement.textContent = formatAmount(balance);
            
            // 根据余额正负设置颜色
            if (balance >= 0) {
                balanceElement.style.color = '#38a169';
            } else {
                balanceElement.style.color = '#e53e3e';
            }
        }

        // 渲染记录列表
        function renderRecords() {
            // 调试：输出记录数据
            console.log('渲染记录:', records);
            
            // 清空现有记录
            const existingRecords = recordsList.querySelectorAll('.record-item');
            existingRecords.forEach(record => record.remove());
            
            if (records.length === 0) {
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            records.forEach((record, index) => {
                console.log(`记录 ${index}:`, record);
                const recordElement = createRecordElement(record);
                recordsList.appendChild(recordElement);
            });
        }

        // 创建记录元素
        function createRecordElement(record) {
            const recordItem = document.createElement('div');
            recordItem.className = 'record-item';
            
            // 确保所有字段都有默认值
            const icon = categoryIcons[record.category] || (record.type === 'income' ? '💰' : '💸');
            const categoryName = categoryNames[record.category] || record.category || '未分类';
            const amountPrefix = record.type === 'income' ? '+' : '-';
            const amountClass = record.type === 'income' ? 'income' : 'expense';
            const description = record.description || '无描述';
            const amount = record.amount || 0;
            const date = record.date || '未知日期';
            
            recordItem.innerHTML = `
                <div class="record-icon ${record.type}">
                    ${icon}
                </div>
                <div class="record-details">
                    <div class="record-description">${description}</div>
                    <div class="record-category">${categoryName}</div>
                </div>
                <div style="text-align: right;">
                    <div class="record-amount ${amountClass}">
                        ${amountPrefix}${formatAmount(amount)}
                    </div>
                    <div class="record-date">${date}</div>
                </div>
            `;
            
            return recordItem;
        }

        // 显示提示消息
        function showToast(message) {
            // 创建提示元素
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.8);
                color: white;
                padding: 15px 25px;
                border-radius: 8px;
                font-size: 16px;
                z-index: 1000;
                animation: fadeIn 0.3s ease;
            `;
            toast.textContent = message;
            
            document.body.appendChild(toast);
            
            // 3秒后移除
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // 事件监听器
        incomeBtn.addEventListener('click', () => switchType('income'));
        expenseBtn.addEventListener('click', () => switchType('expense'));

        recordForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 调试：输出表单元素
            console.log('表单提交，当前类型:', currentType);
            console.log('金额输入框值:', document.getElementById('amount').value);
            console.log('分类选择值:', document.getElementById('category').value);
            console.log('描述输入框值:', document.getElementById('description').value);
            console.log('日期输入框值:', document.getElementById('date').value);
            
            const formData = new FormData(this);
            
            // 调试：输出FormData内容
            for (let [key, value] of formData.entries()) {
                console.log(`FormData ${key}:`, value);
            }
            
            const success = addRecord(formData);
            
            // 只有添加成功才重置表单
            if (success) {
                this.reset();
                
                // 重新设置日期为今天
                const today = new Date().toISOString().split('T')[0];
                dateInput.value = today;
                
                // 重新设置收入/支出状态
                switchType('income');
            }
        });

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', init);

        // 清除所有数据（调试用）
        function clearAllData() {
            if (confirm('确定要清除所有记录吗？此操作不可恢复！')) {
                localStorage.removeItem('ledgerRecords');
                records = [];
                updateStats();
                renderRecords();
                showToast('所有数据已清除！');
            }
        }

        // 添加淡出动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                from { opacity: 1; }
                to { opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
