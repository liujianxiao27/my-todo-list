    <script>
        // 常量定义
        const PRIORITY_VALUES = { 'P0': 0, 'P1': 1, 'P2': 2 };
        const CATEGORY_LABELS = { work: '工作', life: '生活', study: '学习' };
        const MILLISECONDS_PER_DAY = 1000 * 60 * 60 * 24;
        const UPCOMING_DAYS_THRESHOLD = 3;
        
        // 等待页面加载完成后再执行代码
        document.addEventListener('DOMContentLoaded', function() {
            // 获取页面元素
            const taskInput = document.querySelector('.task-input'); // 输入框
            const addButton = document.querySelector('.add-btn'); // 添加按钮
            const taskList = document.querySelector('.task-list'); // 任务列表容器
            const clearAllButton = document.getElementById('clear-all-btn'); // 清空按钮
            const clearCompletedButton = document.getElementById('clear-completed-btn'); // 清空完成按钮
            const priorityButtons = document.querySelectorAll('.priority-btn'); // 优先级按钮
            const categoryButtons = document.querySelectorAll('.category-btn'); // 分类按钮
            const filterButtons = document.querySelectorAll('.filter-btn'); // 筛选按钮
            const searchInput = document.getElementById('search-input'); // 搜索输入框
            const themeToggle = document.getElementById('theme-toggle'); // 深色模式切换按钮
            const dueDateInput = document.getElementById('due-date-input'); // 到期时间输入框
            const sortModeToggle = document.getElementById('sort-mode-toggle'); // 排序模式切换按钮

            // 当前选中的优先级（默认 P0）
            let selectedPriority = 'P0';
            // 当前选中的分类（默认工作）
            let selectedCategory = 'work';
            // 当前筛选的分类（默认全部）
            let currentFilter = 'all';
            // 排序模式：auto（自动排序）或 manual（手动排序）
            let sortMode = localStorage.getItem('sortMode') || 'auto';
            
            // 拖拽相关变量
            let draggedItem = null;
            let draggedOverItem = null;

            // 深色模式切换功能
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                
                // 更新按钮图标
                if (document.body.classList.contains('dark-mode')) {
                    themeToggle.textContent = '☀️';
                    localStorage.setItem('theme', 'dark');
                } else {
                    themeToggle.textContent = '🌙';
                    localStorage.setItem('theme', 'light');
                }
            });

            // 页面加载时检查并应用保存的主题
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                themeToggle.textContent = '☀️';
            }

            // 初始化排序模式按钮
            updateSortModeButton();

            // 排序模式切换功能
            sortModeToggle.addEventListener('click', function() {
                if (sortMode === 'auto') {
                    sortMode = 'manual';
                    localStorage.setItem('sortMode', 'manual');
                } else {
                    sortMode = 'auto';
                    localStorage.setItem('sortMode', 'auto');
                    // 切换回自动排序时，重新排序所有任务
                    reorderAllTasks();
                }
                updateSortModeButton();
            });

            // 更新排序模式按钮显示
            function updateSortModeButton() {
                if (sortMode === 'auto') {
                    sortModeToggle.textContent = '🔄 自动';
                    sortModeToggle.title = '当前：自动排序（点击切换为手动排序）';
                    sortModeToggle.style.background = '#3b82f6';
                } else {
                    sortModeToggle.textContent = '✋ 手动';
                    sortModeToggle.title = '当前：手动排序（点击切换为自动排序）';
                    sortModeToggle.style.background = '#8b5cf6';
                }
            }

            // 重新排序所有任务（切换回自动排序时使用）
            function reorderAllTasks() {
                const allTasks = getAllTaskElements();
                
                // 分离未完成和已完成的任务
                const uncompletedTasks = getUncompletedTaskElements();
                const completedTasks = getCompletedTaskElements();
                
                // 对未完成的任务进行排序 - 使用统一的排序比较函数
                uncompletedTasks.sort(compareTasksForSorting);
                
                // 清空列表
                allTasks.forEach(task => task.remove());
                
                // 重新添加任务
                uncompletedTasks.forEach(task => taskList.appendChild(task));
                completedTasks.forEach(task => taskList.appendChild(task));
                
                // 保存新顺序
                saveTasksToStorage();
            }

            // 优先级按钮点击事件
            priorityButtons.forEach(function(button) {
                button.addEventListener('click', function() {
                    // 移除所有按钮的 active 类
                    priorityButtons.forEach(function(b) {
                        b.classList.remove('active');
                    });
                    
                    // 给当前按钮添加 active 类
                    button.classList.add('active');
                    
                    // 更新选中的优先级
                    selectedPriority = button.dataset.priority;
                });
            });

            // 分类按钮点击事件
            categoryButtons.forEach(function(button) {
                button.addEventListener('click', function() {
                    // 移除所有按钮的 active 类
                    categoryButtons.forEach(function(b) {
                        b.classList.remove('active');
                    });
                    
                    // 给当前按钮添加 active 类
                    button.classList.add('active');
                    
                    // 更新选中的分类
                    selectedCategory = button.dataset.category;
                });
            });

            // 筛选按钮点击事件
            filterButtons.forEach(function(button) {
                button.addEventListener('click', function() {
                    // 移除所有按钮的 active 类
                    filterButtons.forEach(function(b) {
                        b.classList.remove('active');
                    });
                    
                    // 给当前按钮添加 active 类
                    button.classList.add('active');
                    
                    // 更新当前筛选
                    currentFilter = button.dataset.filter;
                    
                    // 应用筛选
                    applyFilter();
                });
            });

            // 搜索功能
            searchInput.addEventListener('input', function() {
                filterTasks(searchInput.value.trim());
            });

            // 点击添加按钮时执行添加任务功能
            addButton.addEventListener('click', handleAddTask);

            // 按下回车键时也能添加任务
            taskInput.addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    handleAddTask();
                }
            });

            // 点击清空按钮时清空所有任务
            clearAllButton.addEventListener('click', clearAllTasks);

            // 点击清空完成按钮时清空已完成的任务
            clearCompletedButton.addEventListener('click', clearCompletedTasks);

            // 创建到期时间标签
            function createDueDateTag(dueDate) {
                const dueDateTag = document.createElement('span');
                dueDateTag.className = 'due-date-tag';
                
                const dueDateTime = new Date(dueDate);
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const dueDay = new Date(dueDateTime.getFullYear(), dueDateTime.getMonth(), dueDateTime.getDate());
                
                // 计算天数差
                const timeDifference = dueDay - today;
                const daysDifference = Math.ceil(timeDifference / MILLISECONDS_PER_DAY);
                
                // 格式化显示
                const month = (dueDateTime.getMonth() + 1).toString().padStart(2, '0');
                const day = dueDateTime.getDate().toString().padStart(2, '0');
                const hours = dueDateTime.getHours().toString().padStart(2, '0');
                const minutes = dueDateTime.getMinutes().toString().padStart(2, '0');
                
                let displayText = `${month}-${day} ${hours}:${minutes}`;
                let isOverdue = false;
                
                // 根据时间差设置样式
                if (daysDifference < 0 || (daysDifference === 0 && dueDateTime < now)) {
                    dueDateTag.classList.add('overdue');
                    displayText = '已逾期 ' + displayText;
                    isOverdue = true;
                } else if (daysDifference === 0) {
                    dueDateTag.classList.add('today');
                    displayText = '今天 ' + displayText;
                } else if (daysDifference <= UPCOMING_DAYS_THRESHOLD) {
                    dueDateTag.classList.add('upcoming');
                    displayText = `${daysDifference}天后 ` + displayText;
                } else {
                    dueDateTag.classList.add('future');
                }
                
                dueDateTag.textContent = displayText;
                dueDateTag.dataset.isOverdue = isOverdue;
                return dueDateTag;
            }

            // 获取所有任务元素的通用函数
            function getAllTaskElements() {
                return Array.from(document.querySelectorAll('.task-item'));
            }

            // 获取未完成任务元素的通用函数
            function getUncompletedTaskElements() {
                return getAllTaskElements().filter(task => task.dataset.completed === 'false');
            }

            // 获取已完成任务元素的通用函数
            function getCompletedTaskElements() {
                return getAllTaskElements().filter(task => task.dataset.completed === 'true');
            }

            // 按分类筛选任务元素的通用函数
            function getTaskElementsByCategory(category) {
                return getAllTaskElements().filter(task => task.dataset.category === category);
            }

            // 统一的任务排序比较函数
            function compareTasksForSorting(taskA, taskB) {
                // 已完成的任务排在最后
                const completedA = taskA.completed !== undefined ? taskA.completed : (taskA.dataset?.completed === 'true');
                const completedB = taskB.completed !== undefined ? taskB.completed : (taskB.dataset?.completed === 'true');
                
                if (completedA && !completedB) return 1;
                if (!completedA && completedB) return -1;
                
                // 未完成的任务按优先级排序（P0最高，P2最低）
                if (!completedA && !completedB) {
                    const priorityA = PRIORITY_VALUES[taskA.priority || taskA.dataset?.priority || 'P0'];
                    const priorityB = PRIORITY_VALUES[taskB.priority || taskB.dataset?.priority || 'P0'];
                    
                    // 如果优先级不同，按优先级排序
                    if (priorityA !== priorityB) {
                        return priorityA - priorityB;
                    }
                    
                    // 如果优先级相同，按截止时间排序
                    const dueDateA = (taskA.dueDate || taskA.dataset?.dueDate) ? new Date(taskA.dueDate || taskA.dataset.dueDate).getTime() : null;
                    const dueDateB = (taskB.dueDate || taskB.dataset?.dueDate) ? new Date(taskB.dueDate || taskB.dataset.dueDate).getTime() : null;
                    
                    // 有截止时间的排在前面
                    if (dueDateA !== null && dueDateB === null) return -1;
                    if (dueDateA === null && dueDateB !== null) return 1;
                    
                    // 如果都有截止时间，早的排在前面
                    if (dueDateA !== null && dueDateB !== null) {
                        return dueDateA - dueDateB;
                    }
                    
                    // 如果都没有截止时间，保持原顺序
                    return 0;
                }
                
                // 已完成的任务保持原顺序
                return 0;
            }

            // 更新DOM元素文本内容的通用函数
            function updateElementText(id, text) {
                const element = document.getElementById(id);
                if (element) {
                    element.textContent = text;
                }
            }

            // 更新DOM元素样式的通用函数
            function updateElementStyle(id, property, value) {
                const element = document.getElementById(id);
                if (element) {
                    element.style[property] = value;
                }
            }

            // 检查并更新任务的逾期状态
            function updateTaskOverdueStatus(taskItem) {
                const dueDate = taskItem.dataset.dueDate;
                const isCompleted = taskItem.dataset.completed === 'true';
                
                if (dueDate && !isCompleted) {
                    const dueDateTime = new Date(dueDate);
                    const now = new Date();
                    
                    if (dueDateTime < now) {
                        taskItem.classList.add('overdue');
                    } else {
                        taskItem.classList.remove('overdue');
                    }
                } else {
                    taskItem.classList.remove('overdue');
                }
            }

            // 添加任务的函数
            async function handleAddTask() {
                // 获取输入框的内容并去除首尾空格
                const taskText = taskInput.value.trim();

                // 检查输入是否为空
                if (taskText === '') {
                    await showConfirmDialog('提示', '请输入任务内容！', false);
                    return; // 结束函数，不继续执行
                }

                // 检查任务是否重复
                if (hasTaskWithSameText(taskText)) {
                    await showConfirmDialog('提示', '该任务已存在，请勿重复添加！', false);
                    return; // 结束函数，不继续执行
                }

                // 隐藏空列表提示
                hideEmptyState();

                // 创建新的任务项
                addNewTask(taskText);

                // 清空输入框
                taskInput.value = '';
            }

            // 检查任务是否重复的函数
            function hasTaskWithSameText(newTaskText) {
                // 获取所有已存在的任务文本
                const existingTasks = document.querySelectorAll('.task-text-content');
                
                // 遍历所有任务，检查是否有相同的内容
                for (let i = 0; i < existingTasks.length; i++) {
                    if (existingTasks[i].textContent === newTaskText) {
                        return true; // 找到重复任务，返回 true
                    }
                }
                
                return false; // 没有重复，返回 false
            }

            // 创建任务DOM元素的通用函数
            function createTaskElement(taskText, priority, category, dueDate, isCompleted) {
                // 创建任务项容器
                const taskItem = document.createElement('div');
                taskItem.className = 'task-item';
                
                // 设置拖拽属性
                taskItem.draggable = true;
                
                // 添加拖拽事件监听
                addDragListeners(taskItem);

                // 创建任务文本元素
                const taskTextElement = document.createElement('span');
                taskTextElement.className = 'task-text';
                
                // 创建优先级标签
                const priorityTag = document.createElement('span');
                priorityTag.className = 'priority-tag ' + priority.toLowerCase();
                priorityTag.textContent = priority;
                
                // 创建分类标签
                const categoryTag = document.createElement('span');
                categoryTag.className = 'category-tag ' + category;
                categoryTag.textContent = CATEGORY_LABELS[category];
                
                // 创建任务文本内容
                const taskTextContent = document.createElement('span');
                taskTextContent.className = 'task-text-content';
                taskTextContent.textContent = taskText;
                
                // 如果任务已完成，应用完成样式
                if (isCompleted) {
                    taskTextContent.style.textDecoration = 'line-through';
                    taskTextContent.style.color = '#a0aec0';
                }
                
                // 组装任务文本：优先级标签 + 分类标签 + 文本内容
                taskTextElement.appendChild(priorityTag);
                taskTextElement.appendChild(categoryTag);
                taskTextElement.appendChild(taskTextContent);
                
                // 如果有到期时间，添加到期时间标签
                if (dueDate) {
                    const dueDateTag = createDueDateTag(dueDate);
                    taskTextElement.appendChild(dueDateTag);
                }
                
                // 添加鼠标悬停事件显示自定义提示框
                taskTextElement.addEventListener('mouseenter', function(event) {
                    showTooltip(event, taskText);
                });
                taskTextElement.addEventListener('mouseleave', function() {
                    hideTooltip();
                });

                // 创建按钮组
                const taskActions = createTaskActions(taskItem);

                // 组装任务项：文本和按钮组添加到任务项
                taskItem.appendChild(taskTextElement);
                taskItem.appendChild(taskActions);

                return taskItem;
            }

            // 创建任务按钮组的通用函数
            function createTaskActions(taskItem) {
                const taskActions = document.createElement('div');
                taskActions.className = 'task-actions';

                // 创建完成按钮
                const completeButton = document.createElement('button');
                completeButton.className = 'complete-btn';
                completeButton.textContent = '完成';
                completeButton.addEventListener('click', function() {
                    completeTask(taskItem);
                });

                // 创建编辑按钮
                const editButton = document.createElement('button');
                editButton.className = 'edit-btn';
                editButton.textContent = '编辑';
                editButton.addEventListener('click', function() {
                    editTask(taskItem);
                });

                // 创建删除按钮
                const deleteButton = document.createElement('button');
                deleteButton.className = 'delete-btn';
                deleteButton.textContent = '删除';
                deleteButton.addEventListener('click', function() {
                    deleteTask(taskItem);
                });

                taskActions.appendChild(completeButton);
                taskActions.appendChild(editButton);
                taskActions.appendChild(deleteButton);

                return taskActions;
            }

            // 创建任务项的函数
            function addNewTask(taskText) {
                // 获取到期时间
                const dueDate = dueDateInput.value || null;
                
                // 使用通用函数创建任务元素
                const taskItem = createTaskElement(taskText, selectedPriority, selectedCategory, dueDate, false);
                
                // 设置数据属性
                taskItem.dataset.completed = 'false';
                taskItem.dataset.priority = selectedPriority;
                taskItem.dataset.category = selectedCategory;
                taskItem.dataset.timestamp = Date.now();
                if (dueDate) {
                    taskItem.dataset.dueDate = dueDate;
                }

                // 根据排序模式插入任务
                if (sortMode === 'auto') {
                    // 按优先级和截止时间插入任务
                    insertTaskByPriority(taskItem);
                } else {
                    // 手动模式：插入到未完成任务的最后
                    const firstCompletedTask = getCompletedTaskElements()[0];
                    if (firstCompletedTask) {
                        taskList.insertBefore(taskItem, firstCompletedTask);
                    } else {
                        taskList.appendChild(taskItem);
                    }
                }

                // 检查并更新逾期状态
                updateTaskOverdueStatus(taskItem);

                // 清空到期时间输入框
                dueDateInput.value = '';

                // 保存任务列表到 localStorage
                saveTasksToStorage();
            }

            // 完成任务的函数
            function completeTask(taskItem) {
                const taskTextContent = taskItem.querySelector('.task-text-content');
                const completeBtn = taskItem.querySelector('.complete-btn');
                
                // 切换删除线样式
                if (taskTextContent.style.textDecoration === 'line-through') {
                    // 恢复任务
                    taskTextContent.style.textDecoration = 'none';
                    taskTextContent.style.color = ''; // 清除内联样式，使用CSS类控制颜色
                    completeBtn.textContent = '完成';
                    completeBtn.style.background = '#10b981';
                    taskItem.dataset.completed = 'false';
                    
                    // 清除完成时间
                    delete taskItem.dataset.completedAt;
                    
                    // 将任务移到未完成任务的最后
                    moveToUncompleted(taskItem);
                    
                    // 检查并更新逾期状态
                    updateTaskOverdueStatus(taskItem);
                } else {
                    // 完成任务
                    taskTextContent.style.textDecoration = 'line-through';
                    taskTextContent.style.color = '#a0aec0';
                    completeBtn.textContent = '恢复';
                    completeBtn.style.background = '#f59e0b';
                    taskItem.dataset.completed = 'true';
                    
                    // 记录完成时间
                    taskItem.dataset.completedAt = Date.now();
                    
                    // 移除逾期样式
                    taskItem.classList.remove('overdue');
                    
                    // 将任务移到列表最后
                    moveToCompleted(taskItem);
                }

                // 保存任务列表到 localStorage
                saveTasksToStorage();
            }

            // 将已完成任务移到列表最后的函数
            function moveToCompleted(taskItem) {
                taskList.appendChild(taskItem);
            }

            // 按优先级和截止时间插入任务的函数
            function insertTaskByPriority(taskItem) {
                // 获取所有未完成的任务（不包括当前要插入的任务）
                const uncompletedTasks = getUncompletedTaskElements().filter(task => task !== taskItem);
                
                // 找到正确的插入位置 - 使用统一的排序比较函数
                let insertBeforeTask = null;
                for (let i = 0; i < uncompletedTasks.length; i++) {
                    // 使用统一的比较函数，如果当前任务应该排在前面（返回负数），则插入到这个位置
                    if (compareTasksForSorting(taskItem, uncompletedTasks[i]) < 0) {
                        insertBeforeTask = uncompletedTasks[i];
                        break;
                    }
                }
                
                if (insertBeforeTask) {
                    // 插入到找到的位置之前
                    taskList.insertBefore(taskItem, insertBeforeTask);
                } else {
                    // 如果没有找到合适的位置，插入到已完成任务之前
                    const firstCompletedTask = getCompletedTaskElements()[0];
                    if (firstCompletedTask) {
                        taskList.insertBefore(taskItem, firstCompletedTask);
                    } else {
                        // 如果没有已完成的任务，添加到列表最后
                        const emptyState = taskList.querySelector('.empty-state');
                        if (emptyState && emptyState.style.display !== 'none') {
                            taskList.insertBefore(taskItem, emptyState.nextSibling);
                        } else {
                            taskList.appendChild(taskItem);
                        }
                    }
                }
            }

            // 将恢复的任务移到未完成任务的正确位置（按优先级和截止时间排序）
            function moveToUncompleted(taskItem) {
                // 使用统一的插入函数
                taskItem.remove();
                insertTaskByPriority(taskItem);
            }

            // 删除任务的函数
            async function deleteTask(taskItem) {
                // 使用自定义弹窗进行二次确认
                const taskText = taskItem.querySelector('.task-text-content').textContent;
                const confirmed = await showConfirmDialog(
                    '删除任务',
                    `确定要删除任务"${taskText}"吗？`,
                    true
                );
                
                if (confirmed) {
                    taskItem.remove(); // 从页面中移除任务项
                    
                    // 检查是否需要显示空列表提示
                    checkEmptyState();

                    // 保存任务列表到 localStorage
                    saveTasksToStorage();
                }
            }

            // 编辑任务的函数
            function editTask(taskItem) {
                const taskTextContent = taskItem.querySelector('.task-text-content');
                const currentText = taskTextContent.textContent;
                const currentPriority = taskItem.dataset.priority;
                const currentCategory = taskItem.dataset.category;
                const currentDueDate = taskItem.dataset.dueDate || '';

                // 显示编辑弹窗
                showEditModal(taskItem, currentText, currentPriority, currentCategory, currentDueDate);
            }

            // 显示编辑弹窗
            function showEditModal(taskItem, currentText, currentPriority, currentCategory, currentDueDate) {
                const modalOverlay = document.getElementById('modal-overlay');
                const modalTitle = document.getElementById('modal-title');
                const modalContent = document.getElementById('modal-content');
                const modalButtons = document.querySelector('.modal-buttons');

                modalTitle.textContent = '编辑任务';
                
                // 创建编辑表单
                const editForm = document.createElement('div');
                editForm.className = 'edit-form';

                // 任务内容输入
                const textGroup = document.createElement('div');
                textGroup.className = 'edit-form-group';
                const textLabel = document.createElement('label');
                textLabel.className = 'edit-form-label';
                textLabel.textContent = '任务内容';
                const textInput = document.createElement('input');
                textInput.type = 'text';
                textInput.className = 'edit-form-input';
                textInput.value = currentText;
                textInput.id = 'edit-text-input';
                textGroup.appendChild(textLabel);
                textGroup.appendChild(textInput);

                // 优先级选择
                const priorityGroup = document.createElement('div');
                priorityGroup.className = 'edit-form-group';
                const priorityLabel = document.createElement('label');
                priorityLabel.className = 'edit-form-label';
                priorityLabel.textContent = '优先级';
                const priorityButtons = document.createElement('div');
                priorityButtons.className = 'edit-form-buttons';
                ['P0', 'P1', 'P2'].forEach(function(priority) {
                    const btn = document.createElement('button');
                    btn.className = 'priority-btn ' + priority.toLowerCase();
                    btn.textContent = priority;
                    btn.dataset.priority = priority;
                    if (priority === currentPriority) {
                        btn.classList.add('active');
                    }
                    btn.addEventListener('click', function(e) {
                        e.preventDefault();
                        priorityButtons.querySelectorAll('.priority-btn').forEach(function(b) {
                            b.classList.remove('active');
                        });
                        btn.classList.add('active');
                    });
                    priorityButtons.appendChild(btn);
                });
                priorityGroup.appendChild(priorityLabel);
                priorityGroup.appendChild(priorityButtons);

                // 分类选择
                const categoryGroup = document.createElement('div');
                categoryGroup.className = 'edit-form-group';
                const categoryLabel = document.createElement('label');
                categoryLabel.className = 'edit-form-label';
                categoryLabel.textContent = '分类';
                const categoryButtons = document.createElement('div');
                categoryButtons.className = 'edit-form-buttons';
                const categories = [
                    { value: 'work', label: '工作' },
                    { value: 'life', label: '生活' },
                    { value: 'study', label: '学习' }
                ];
                categories.forEach(function(cat) {
                    const btn = document.createElement('button');
                    btn.className = 'category-btn ' + cat.value;
                    btn.textContent = cat.label;
                    btn.dataset.category = cat.value;
                    if (cat.value === currentCategory) {
                        btn.classList.add('active');
                    }
                    btn.addEventListener('click', function(e) {
                        e.preventDefault();
                        categoryButtons.querySelectorAll('.category-btn').forEach(function(b) {
                            b.classList.remove('active');
                        });
                        btn.classList.add('active');
                    });
                    categoryButtons.appendChild(btn);
                });
                categoryGroup.appendChild(categoryLabel);
                categoryGroup.appendChild(categoryButtons);

                // 到期时间选择
                const dueDateGroup = document.createElement('div');
                dueDateGroup.className = 'edit-form-group';
                const dueDateLabel = document.createElement('label');
                dueDateLabel.className = 'edit-form-label';
                dueDateLabel.textContent = '到期时间（可选）';
                const dueDateInput = document.createElement('input');
                dueDateInput.type = 'datetime-local';
                dueDateInput.className = 'edit-form-input';
                dueDateInput.value = currentDueDate;
                dueDateInput.id = 'edit-due-date-input';
                dueDateGroup.appendChild(dueDateLabel);
                dueDateGroup.appendChild(dueDateInput);

                // 组装表单
                editForm.appendChild(textGroup);
                editForm.appendChild(priorityGroup);
                editForm.appendChild(categoryGroup);
                editForm.appendChild(dueDateGroup);

                // 替换弹窗内容
                modalContent.innerHTML = '';
                modalContent.appendChild(editForm);

                // 修改按钮
                modalButtons.innerHTML = '';
                
                const cancelBtn = document.createElement('button');
                cancelBtn.className = 'modal-btn modal-btn-cancel';
                cancelBtn.textContent = '取消';
                cancelBtn.addEventListener('click', function() {
                    modalOverlay.classList.remove('active');
                });

                const confirmBtn = document.createElement('button');
                confirmBtn.className = 'modal-btn modal-btn-confirm';
                confirmBtn.textContent = '保存';
                confirmBtn.addEventListener('click', async function() {
                    const newText = textInput.value.trim();
                    const newPriority = priorityButtons.querySelector('.priority-btn.active').dataset.priority;
                    const newCategory = categoryButtons.querySelector('.category-btn.active').dataset.category;
                    const newDueDate = dueDateInput.value || null;

                    // 检查输入是否为空
                    if (newText === '') {
                        await showConfirmDialog('提示', '任务内容不能为空！', false);
                        textInput.focus();
                        return;
                    }

                    // 检查是否与其他任务重复（排除自己）
                    const taskTextContent = taskItem.querySelector('.task-text-content');
                    const allTasks = document.querySelectorAll('.task-text-content');
                    let isDuplicate = false;
                    allTasks.forEach(function(task) {
                        if (task !== taskTextContent && task.textContent === newText) {
                            isDuplicate = true;
                        }
                    });

                    if (isDuplicate) {
                        await showConfirmDialog('提示', '该任务已存在，请勿重复添加！', false);
                        textInput.focus();
                        return;
                    }

                    // 更新任务
                    updateTask(taskItem, newText, newPriority, newCategory, newDueDate);
                    
                    // 关闭弹窗
                    modalOverlay.classList.remove('active');
                });

                modalButtons.appendChild(cancelBtn);
                modalButtons.appendChild(confirmBtn);

                // 显示弹窗
                modalOverlay.classList.add('active');
                
                // 聚焦到输入框
                setTimeout(function() {
                    textInput.focus();
                    textInput.select();
                }, 100);
            }

            // 更新任务信息
            function updateTask(taskItem, newText, newPriority, newCategory, newDueDate) {
                const taskTextContent = taskItem.querySelector('.task-text-content');
                const priorityTag = taskItem.querySelector('.priority-tag');
                const categoryTag = taskItem.querySelector('.category-tag');
                const taskTextSpan = taskItem.querySelector('.task-text');
                
                // 更新任务文本
                taskTextContent.textContent = newText;
                
                // 更新优先级
                const oldPriority = taskItem.dataset.priority;
                priorityTag.className = 'priority-tag ' + newPriority.toLowerCase();
                priorityTag.textContent = newPriority;
                taskItem.dataset.priority = newPriority;
                
                // 更新分类
                const categoryNames = { work: '工作', life: '生活', study: '学习' };
                categoryTag.className = 'category-tag ' + newCategory;
                categoryTag.textContent = categoryNames[newCategory];
                taskItem.dataset.category = newCategory;
                
                // 更新到期时间
                if (newDueDate) {
                    taskItem.dataset.dueDate = newDueDate;
                } else {
                    delete taskItem.dataset.dueDate;
                }
                
                // 移除旧的到期时间标签
                const oldDueDateTag = taskTextSpan.querySelector('.due-date-tag');
                if (oldDueDateTag) {
                    oldDueDateTag.remove();
                }
                
                // 添加新的到期时间标签
                if (newDueDate) {
                    const dueDateTag = createDueDateTag(newDueDate);
                    taskTextSpan.appendChild(dueDateTag);
                }

                // 如果优先级改变了，需要重新排序（仅在自动排序模式下）
                if (sortMode === 'auto' && oldPriority !== newPriority && taskItem.dataset.completed === 'false') {
                    // 更新时间戳为当前时间（编辑后视为重新加入）
                    taskItem.dataset.timestamp = Date.now();
                    // 移除任务
                    taskItem.remove();
                    // 按新优先级重新插入
                    insertTaskByPriority(taskItem);
                }

                // 检查并更新逾期状态
                updateTaskOverdueStatus(taskItem);

                // 保存任务列表到 localStorage
                saveTasksToStorage();
            }

            // 隐藏空列表提示的函数
            function hideEmptyState() {
                const emptyState = document.querySelector('.empty-state');
                if (emptyState) {
                    emptyState.style.display = 'none';
                }
            }

            // 检查并显示空列表提示的函数
            function checkEmptyState() {
                const tasks = getAllTaskElements();
                const emptyState = document.querySelector('.empty-state');
                
                if (tasks.length === 0 && emptyState) {
                    emptyState.querySelector('p').textContent = '暂无任务，快来添加第一个任务吧！';
                    emptyState.style.display = 'block';
                }
            }

            // 清空所有任务的函数
            async function clearAllTasks() {
                // 使用自定义弹窗进行二次确认
                const confirmed = await showConfirmDialog(
                    '清空所有任务',
                    '确定要清空所有任务吗？此操作不可恢复！',
                    true
                );
                
                if (confirmed) {
                    const allTasks = getAllTaskElements();
                    allTasks.forEach(function(task) {
                        task.remove();
                    });
                    
                    // 显示空列表提示
                    checkEmptyState();

                    // 保存任务列表到 localStorage
                    saveTasksToStorage();
                }
            }

            // 清空已完成任务的函数
            async function clearCompletedTasks() {
                // 获取所有已完成的任务
                const completedTasks = getCompletedTaskElements();
                
                if (completedTasks.length === 0) {
                    await showConfirmDialog(
                        '提示',
                        '没有已完成的任务！',
                        false
                    );
                    return;
                }
                
                // 使用自定义弹窗进行二次确认
                const confirmed = await showConfirmDialog(
                    '清空已完成任务',
                    `确定要清空 ${completedTasks.length} 个已完成的任务吗？此操作不可恢复！`,
                    true
                );
                
                if (confirmed) {
                    completedTasks.forEach(function(task) {
                        task.remove();
                    });
                    
                    // 检查是否需要显示空列表提示
                    checkEmptyState();

                    // 保存任务列表到 localStorage
                    saveTasksToStorage();
                }
            }

            // 为已存在的任务添加事件监听（页面初始的任务）
            const existingTasks = getAllTaskElements();
            existingTasks.forEach(function(taskItem) {
                // 为完成按钮添加事件
                const completeBtn = taskItem.querySelector('.complete-btn');
                completeBtn.addEventListener('click', function() {
                    completeTask(taskItem);
                });

                // 为删除按钮添加事件
                const deleteBtn = taskItem.querySelector('.delete-btn');
                deleteBtn.addEventListener('click', function() {
                    deleteTask(taskItem);
                });
            });

            // 页面加载时检查是否需要显示空列表提示
            checkEmptyState();

            // 从 localStorage 加载任务列表
            loadTasksFromStorage();

            // 定期更新所有任务的逾期状态（每分钟检查一次）
            setInterval(function() {
                const allTasks = getAllTaskElements();
                allTasks.forEach(function(taskItem) {
                    // 更新逾期状态
                    updateTaskOverdueStatus(taskItem);
                    
                    // 如果有到期时间标签，更新标签内容
                    const dueDateTag = taskItem.querySelector('.due-date-tag');
                    if (dueDateTag && taskItem.dataset.dueDate) {
                        const oldDueDateTag = dueDateTag;
                        const newDueDateTag = createDueDateTag(taskItem.dataset.dueDate);
                        oldDueDateTag.parentNode.replaceChild(newDueDateTag, oldDueDateTag);
                    }
                });
            }, 60000); // 每60秒检查一次

            // localStorage 数据持久化功能

            // 保存任务列表到 localStorage
            function saveTasksToStorage() {
                // 获取所有任务项
                const allTasks = getAllTaskElements();
                const tasksData = [];

                // 遍历所有任务，提取任务内容、完成状态、优先级、分类、时间戳、到期时间和完成时间
                allTasks.forEach(function(taskItem) {
                    const taskText = taskItem.querySelector('.task-text-content').textContent;
                    const isCompleted = taskItem.dataset.completed === 'true';
                    const priority = taskItem.dataset.priority || 'P0';
                    const category = taskItem.dataset.category || 'work';
                    const timestamp = parseInt(taskItem.dataset.timestamp) || Date.now();
                    const dueDate = taskItem.dataset.dueDate || null;
                    const completedAt = taskItem.dataset.completedAt ? parseInt(taskItem.dataset.completedAt) : null;
                    
                    // 将任务数据添加到数组
                    tasksData.push({
                        text: taskText,
                        completed: isCompleted,
                        priority: priority,
                        category: category,
                        timestamp: timestamp,
                        dueDate: dueDate,
                        completedAt: completedAt
                    });
                });

                // 将任务数组转换为 JSON 字符串并保存到 localStorage
                localStorage.setItem('todoList', JSON.stringify(tasksData));
            }

            // 从 localStorage 读取任务列表
            function loadTasksFromStorage() {
                // 从 localStorage 获取保存的数据
                const savedData = localStorage.getItem('todoList');

                // 如果没有保存的数据，直接返回
                if (!savedData) {
                    return;
                }

                try {
                    // 将 JSON 字符串转换为数组
                    const tasksData = JSON.parse(savedData);

                    // 如果有任务数据，隐藏空列表提示
                    if (tasksData.length > 0) {
                        hideEmptyState();
                    }

                    // 仅在自动排序模式下进行排序
                    if (sortMode === 'auto') {
                        // 使用统一的排序比较函数
                        tasksData.sort(compareTasksForSorting);
                    }
                    // 手动排序模式下，保持存储的顺序

                    // 遍历任务数据，创建任务项
                    tasksData.forEach(function(taskData) {
                        createTaskFromStoredData(taskData.text, taskData.completed, taskData.priority || 'P0', taskData.category || 'work', taskData.timestamp || Date.now(), taskData.dueDate || null, taskData.completedAt || null);
                    });
                } catch (error) {
                    // 如果数据格式错误，清除无效数据
                    console.error('读取任务数据失败:', error);
                    localStorage.removeItem('todoList');
                }
            }

            // 从数据创建任务项（用于加载保存的任务）
            function createTaskFromStoredData(taskText, isCompleted, priority, category, timestamp, dueDate, completedAt) {
                // 创建任务项容器
                const taskItem = document.createElement('div');
                taskItem.className = 'task-item';
                taskItem.dataset.completed = isCompleted ? 'true' : 'false';
                taskItem.dataset.priority = priority || 'P0';
                taskItem.dataset.category = category || 'work';
                taskItem.dataset.timestamp = timestamp || Date.now();
                if (dueDate) {
                    taskItem.dataset.dueDate = dueDate;
                }
                if (completedAt) {
                    taskItem.dataset.completedAt = completedAt;
                }
                
                // 设置拖拽属性
                taskItem.draggable = true;
                
                // 添加拖拽事件监听
                addDragListeners(taskItem);

                // 创建任务文本元素
                const taskTextSpan = document.createElement('span');
                taskTextSpan.className = 'task-text';
                
                // 创建优先级标签
                const priorityTag = document.createElement('span');
                priorityTag.className = 'priority-tag ' + (priority || 'P0').toLowerCase();
                priorityTag.textContent = priority || 'P0';
                
                // 创建分类标签
                const categoryTag = document.createElement('span');
                categoryTag.className = 'category-tag ' + (category || 'work');
                categoryTag.textContent = CATEGORY_LABELS[category || 'work'];
                
                // 创建任务文本内容
                const taskTextContent = document.createElement('span');
                taskTextContent.className = 'task-text-content';
                taskTextContent.textContent = taskText;
                
                // 如果任务已完成，应用完成样式
                if (isCompleted) {
                    taskTextContent.style.textDecoration = 'line-through';
                    taskTextContent.style.color = '#a0aec0';
                }
                
                // 组装任务文本：优先级标签 + 分类标签 + 文本内容
                taskTextSpan.appendChild(priorityTag);
                taskTextSpan.appendChild(categoryTag);
                taskTextSpan.appendChild(taskTextContent);
                
                // 如果有到期时间，添加到期时间标签
                if (dueDate) {
                    const dueDateTag = createDueDateTag(dueDate);
                    taskTextSpan.appendChild(dueDateTag);
                }
                
                // 添加鼠标悬停事件显示自定义提示框
                taskTextSpan.addEventListener('mouseenter', function(event) {
                    showTooltip(event, taskText);
                });
                taskTextSpan.addEventListener('mouseleave', function() {
                    hideTooltip();
                });

                // 创建按钮组容器
                const taskActions = document.createElement('div');
                taskActions.className = 'task-actions';

                // 创建完成/恢复按钮
                const completeBtn = document.createElement('button');
                completeBtn.className = 'complete-btn';
                completeBtn.textContent = isCompleted ? '恢复' : '完成';
                
                // 如果任务已完成，设置恢复按钮样式
                if (isCompleted) {
                    completeBtn.style.background = '#f59e0b';
                }
                
                // 点击完成按钮时的处理
                completeBtn.addEventListener('click', function() {
                    completeTask(taskItem);
                });

                // 创建编辑按钮
                const editBtn = document.createElement('button');
                editBtn.className = 'edit-btn';
                editBtn.textContent = '编辑';
                // 点击编辑按钮时的处理
                editBtn.addEventListener('click', function() {
                    editTask(taskItem);
                });

                // 创建删除按钮
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = '删除';
                // 点击删除按钮时的处理
                deleteBtn.addEventListener('click', function() {
                    deleteTask(taskItem);
                });

                // 组装任务项：按钮添加到按钮组
                taskActions.appendChild(completeBtn);
                taskActions.appendChild(editBtn);
                taskActions.appendChild(deleteBtn);

                // 组装任务项：文本和按钮组添加到任务项
                taskItem.appendChild(taskTextSpan);
                taskItem.appendChild(taskActions);

                // 直接添加到列表末尾（因为加载时已经排序好了）
                taskList.appendChild(taskItem);

                // 检查并更新逾期状态
                updateTaskOverdueStatus(taskItem);
            }

            // 自定义确认弹窗功能
            const modalOverlay = document.getElementById('modal-overlay');
            const modalTitle = document.getElementById('modal-title');
            const modalContent = document.getElementById('modal-content');
            const modalConfirm = document.getElementById('modal-confirm');
            const modalCancel = document.getElementById('modal-cancel');
            let modalCallback = null;

            // 显示自定义确认弹窗
            function showConfirmDialog(title, message, isDanger = false) {
                return new Promise(function(resolve) {
                    modalTitle.textContent = title;
                    modalContent.textContent = message;
                    modalOverlay.classList.add('active');
                    
                    // 设置确认按钮样式
                    modalConfirm.className = 'modal-btn ' + (isDanger ? 'modal-btn-danger' : 'modal-btn-confirm');
                    
                    // 如果不是危险操作（仅提示），隐藏取消按钮
                    if (!isDanger && (title === '提示' || message.includes('没有'))) {
                        modalCancel.style.display = 'none';
                        modalConfirm.textContent = '知道了';
                    } else {
                        modalCancel.style.display = 'block';
                        modalConfirm.textContent = '确定';
                    }
                    
                    // 确认按钮点击事件
                    modalCallback = function(result) {
                        modalOverlay.classList.remove('active');
                        resolve(result);
                        modalCallback = null;
                    };
                });
            }

            // 确认按钮点击
            modalConfirm.addEventListener('click', function() {
                if (modalCallback) {
                    modalCallback(true);
                }
            });

            // 取消按钮点击
            modalCancel.addEventListener('click', function() {
                if (modalCallback) {
                    modalCallback(false);
                }
            });

            // 点击遮罩层关闭弹窗
            modalOverlay.addEventListener('click', function(event) {
                if (event.target === modalOverlay && modalCallback) {
                    modalCallback(false);
                }
            });

            // 自定义提示框功能
            let tooltip = null;

            // 显示自定义提示框
            function showTooltip(event, text) {
                // 检查文本是否溢出，如果没有溢出则不显示提示框
                const element = event.target;
                if (element.scrollWidth <= element.clientWidth) {
                    return;
                }

                // 创建提示框元素
                if (!tooltip) {
                    tooltip = document.createElement('div');
                    tooltip.className = 'custom-tooltip';
                    document.body.appendChild(tooltip);
                }

                tooltip.textContent = text;
                tooltip.style.display = 'block';
                
                // 计算提示框位置
                const rect = element.getBoundingClientRect();
                const tooltipRect = tooltip.getBoundingClientRect();
                
                // 提示框显示在元素上方，居中对齐
                let left = rect.left + (rect.width / 2) - (tooltipRect.width / 2);
                let top = rect.top - tooltipRect.height - 8;
                
                // 计算箭头位置（相对于提示框）
                let arrowLeft = tooltipRect.width / 2;
                
                // 防止提示框超出屏幕左侧
                if (left < 10) {
                    arrowLeft = arrowLeft - (10 - left);
                    left = 10;
                }
                
                // 防止提示框超出屏幕右侧
                if (left + tooltipRect.width > window.innerWidth - 10) {
                    const overflow = (left + tooltipRect.width) - (window.innerWidth - 10);
                    arrowLeft = arrowLeft + overflow;
                    left = window.innerWidth - tooltipRect.width - 10;
                }
                
                // 设置箭头位置
                tooltip.style.setProperty('--arrow-left', arrowLeft + 'px');
                
                // 如果上方空间不够，显示在下方
                if (top < 10) {
                    top = rect.bottom + 8;
                    tooltip.classList.add('bottom');
                } else {
                    tooltip.classList.remove('bottom');
                }
                
                tooltip.style.left = left + 'px';
                tooltip.style.top = top + 'px';
                
                // 显示提示框
                setTimeout(function() {
                    tooltip.classList.add('show');
                }, 10);
            }

            // 隐藏自定义提示框
            function hideTooltip() {
                if (tooltip) {
                    tooltip.classList.remove('show');
                }
            }

            // 搜索过滤任务的函数
            function filterTasks(searchText) {
                const allTasks = getAllTaskElements();
                const emptyState = document.querySelector('.empty-state');
                let visibleCount = 0;

                // 如果搜索框为空，根据分类筛选显示任务
                if (searchText === '') {
                    allTasks.forEach(function(task) {
                        const taskCategory = task.dataset.category;
                        if (currentFilter === 'all' || taskCategory === currentFilter) {
                            task.style.display = 'flex';
                            visibleCount++;
                        } else {
                            task.style.display = 'none';
                        }
                    });
                } else {
                    // 遍历所有任务，检查是否匹配搜索关键词和分类筛选
                    allTasks.forEach(function(task) {
                        const taskText = task.querySelector('.task-text-content').textContent.toLowerCase();
                        const priority = task.dataset.priority.toLowerCase();
                        const taskCategory = task.dataset.category;
                        const searchLower = searchText.toLowerCase();

                        // 匹配任务文本或优先级，并且符合分类筛选
                        const matchesSearch = taskText.includes(searchLower) || priority.includes(searchLower);
                        const matchesFilter = currentFilter === 'all' || taskCategory === currentFilter;

                        if (matchesSearch && matchesFilter) {
                            task.style.display = 'flex';
                            visibleCount++;
                        } else {
                            task.style.display = 'none';
                        }
                    });
                }

                // 如果没有可见的任务，显示空列表提示
                if (visibleCount === 0) {
                    if (emptyState) {
                        emptyState.style.display = 'block';
                        if (searchText !== '') {
                            emptyState.querySelector('p').textContent = '没有找到匹配的任务';
                        } else {
                            emptyState.querySelector('p').textContent = '该分类暂无任务';
                        }
                    }
                } else {
                    if (emptyState) {
                        emptyState.style.display = 'none';
                    }
                }
            }

            // 应用分类筛选的函数
            function applyFilter() {
                // 清空搜索框
                searchInput.value = '';
                // 应用筛选
                filterTasks('');
            }

            // 统计功能实现
            const statsBtn = document.getElementById('stats-btn');
            const statsModalOverlay = document.getElementById('stats-modal-overlay');
            const statsClose = document.getElementById('stats-close');
            const statsTabs = document.querySelectorAll('.stats-tab');

            // 打开统计弹窗
            statsBtn.addEventListener('click', function() {
                refreshStatisticsDisplay();
                statsModalOverlay.classList.add('active');
            });

            // 关闭统计弹窗
            statsClose.addEventListener('click', function() {
                statsModalOverlay.classList.remove('active');
            });

            // 点击遮罩层关闭统计弹窗
            statsModalOverlay.addEventListener('click', function(event) {
                if (event.target === statsModalOverlay) {
                    statsModalOverlay.classList.remove('active');
                }
            });

            // 统计标签页切换
            statsTabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    const period = this.dataset.period;
                    
                    // 切换标签页激活状态
                    statsTabs.forEach(function(t) {
                        t.classList.remove('active');
                    });
                    this.classList.add('active');
                    
                    // 切换内容显示
                    document.querySelectorAll('.stats-content').forEach(function(content) {
                        content.classList.remove('active');
                    });
                    document.getElementById('stats-' + period).classList.add('active');
                });
            });

            // 更新统计数据
            function refreshStatisticsDisplay() {
                const timeRanges = getTimeRanges();

                // 获取所有任务
                const allTasks = getAllTaskElements();

                // 按截止时间（到期时间）维度分类任务
                // 今日：到期时间在今天的任务
                const dayTasks = allTasks.filter(task => {
                    if (!task.dataset.dueDate) return false; // 没有到期时间的不统计
                    const dueDate = new Date(task.dataset.dueDate);
                    return dueDate >= today && dueDate < todayEnd;
                });

                // 本周：到期时间在本周的任务
                const weekTasks = allTasks.filter(task => {
                    if (!task.dataset.dueDate) return false;
                    const dueDate = new Date(task.dataset.dueDate);
                    return dueDate >= weekStart && dueDate < weekEnd;
                });

                // 本月：到期时间在本月的任务
                const monthTasks = allTasks.filter(task => {
                    if (!task.dataset.dueDate) return false;
                    const dueDate = new Date(task.dataset.dueDate);
                    return dueDate >= monthStart && dueDate < monthEnd;
                });

                // 按完成时间维度分类已完成的任务
                const dayCompletedTasks = allTasks.filter(task => {
                    if (task.dataset.completed !== 'true') return false;
                    const completedAt = parseInt(task.dataset.completedAt);
                    if (!completedAt) return false;
                    return completedAt >= today.getTime() && completedAt < todayEnd.getTime();
                });

                const weekCompletedTasks = allTasks.filter(task => {
                    if (task.dataset.completed !== 'true') return false;
                    const completedAt = parseInt(task.dataset.completedAt);
                    if (!completedAt) return false;
                    return completedAt >= weekStart.getTime() && completedAt < weekEnd.getTime();
                });

                const monthCompletedTasks = allTasks.filter(task => {
                    if (task.dataset.completed !== 'true') return false;
                    const completedAt = parseInt(task.dataset.completedAt);
                    if (!completedAt) return false;
                    return completedAt >= monthStart.getTime() && completedAt < monthEnd.getTime();
                });

                // 计算统计数据（传入按到期时间筛选的任务和按完成时间筛选的已完成任务）
                calculateStats('day', dayTasks, dayCompletedTasks);
                calculateStats('week', weekTasks, weekCompletedTasks);
                calculateStats('month', monthTasks, monthCompletedTasks);
                calculateStats('all', allTasks, getCompletedTaskElements());

                // 计算分类统计（仅全部）
                updateElementText('all-work', getTaskElementsByCategory('work').length);
                updateElementText('all-life', getTaskElementsByCategory('life').length);
                updateElementText('all-study', getTaskElementsByCategory('study').length);
            }

            // 计算统计数据
            function calculateStats(period, tasks, completedTasks) {
                const total = tasks.length;
                const completed = completedTasks.length;
                
                // 计算逾期任务（未完成且有到期时间且已过期）
                const now = new Date();
                const overdue = tasks.filter(task => {
                    if (task.dataset.completed === 'true') return false;
                    if (!task.dataset.dueDate) return false;
                    const dueDate = new Date(task.dataset.dueDate);
                    return dueDate < now;
                }).length;

                const completionRate = total > 0 ? Math.round((completed / total) * 100) : 0;
                const overdueRate = total > 0 ? Math.round((overdue / total) * 100) : 0;

                // 更新DOM
                updateElementText(period + '-total', total);
                updateElementText(period + '-completed', completed);
                updateElementText(period + '-overdue', overdue);
                updateElementText(period + '-completion-rate', completionRate + '%');
                updateElementText(period + '-overdue-rate', overdueRate + '%');
                updateElementStyle(period + '-completion-bar', 'width', completionRate + '%');
                updateElementStyle(period + '-overdue-bar', 'width', overdueRate + '%');
            }

            // 拖拽功能实现
            function addDragListeners(taskItem) {
                taskItem.addEventListener('dragstart', handleDragStart);
                taskItem.addEventListener('dragend', handleDragEnd);
                taskItem.addEventListener('dragover', handleDragOver);
                taskItem.addEventListener('drop', handleDrop);
                taskItem.addEventListener('dragenter', handleDragEnter);
                taskItem.addEventListener('dragleave', handleDragLeave);
            }

            function handleDragStart(e) {
                draggedItem = this;
                this.style.opacity = '0.4';
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/html', this.innerHTML);
            }

            function handleDragEnd(e) {
                this.style.opacity = '1';
                
                // 移除所有拖拽样式
                const allItems = getAllTaskElements();
                allItems.forEach(function(item) {
                    item.classList.remove('drag-over');
                });
                
                draggedItem = null;
                draggedOverItem = null;
            }

            function handleDragOver(e) {
                if (e.preventDefault) {
                    e.preventDefault();
                }
                e.dataTransfer.dropEffect = 'move';
                return false;
            }

            function handleDragEnter(e) {
                if (this !== draggedItem) {
                    this.classList.add('drag-over');
                }
            }

            function handleDragLeave(e) {
                this.classList.remove('drag-over');
            }

            function handleDrop(e) {
                if (e.stopPropagation) {
                    e.stopPropagation();
                }
                
                if (draggedItem !== this) {
                    // 切换到手动排序模式
                    if (sortMode === 'auto') {
                        sortMode = 'manual';
                        localStorage.setItem('sortMode', 'manual');
                        updateSortModeButton();
                    }
                    
                    // 获取拖拽项和目标项的完成状态
                    const draggedCompleted = draggedItem.dataset.completed === 'true';
                    const targetCompleted = this.dataset.completed === 'true';
                    
                    // 只允许在相同完成状态的任务之间拖拽
                    if (draggedCompleted === targetCompleted) {
                        // 获取所有任务项
                        const allItems = getAllTaskElements();
                        const draggedIndex = allItems.indexOf(draggedItem);
                        const targetIndex = allItems.indexOf(this);
                        
                        // 执行拖拽交换
                        if (draggedIndex < targetIndex) {
                            taskList.insertBefore(draggedItem, this.nextSibling);
                        } else {
                            taskList.insertBefore(draggedItem, this);
                        }
                        
                        // 保存新顺序
                        saveTasksToStorage();
                    }
                }
                
                this.classList.remove('drag-over');
                return false;
            }
        });
    </script>
