<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日名言展示器</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 导航头部 */
        .nav-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            padding: 15px 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #5a67d8;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .nav-title {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
        }

        /* 页面整体样式 - 添加顶部间距 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px 20px 20px; /* 顶部增加间距 */
        }

        /* 主容器 */
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            animation: fadeIn 0.6s ease-in;
        }

        /* 淡入动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 页面标题 */
        .title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 40px;
            position: relative;
            padding-bottom: 15px;
        }

        /* 标题下划线装饰 */
        .title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        /* 名言展示区域 */
        .quote-container {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 40px;
            position: relative;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 左上角引号装饰 */
        .quote-container::before {
            content: '"';
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 60px;
            color: rgba(102, 126, 234, 0.2);
            font-family: Georgia, serif;
            line-height: 1;
        }

        /* 右下角引号装饰 */
        .quote-container::after {
            content: '"';
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 60px;
            color: rgba(102, 126, 234, 0.2);
            font-family: Georgia, serif;
            line-height: 1;
        }

        /* 名言文本 */
        .quote-text {
            font-size: 24px;
            line-height: 1.6;
            color: #2d3748;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        /* 作者信息 */
        .quote-author {
            font-size: 18px;
            color: #667eea;
            text-align: right;
            font-style: italic;
            position: relative;
            z-index: 1;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 18px;
        }

        /* 加载动画 */
        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% {
                content: '.';
            }
            40% {
                content: '..';
            }
            60%, 100% {
                content: '...';
            }
        }

        /* 刷新按钮 */
        .refresh-button {
            display: block;
            margin: 30px auto 0;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .refresh-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .refresh-button:active {
            transform: translateY(0);
        }

        /* 按钮组容器 */
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        /* 收藏按钮 */
        .favorite-button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .favorite-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }

        .favorite-button:active {
            transform: translateY(0);
        }

        /* 查看收藏按钮 */
        .view-favorites-button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        .view-favorites-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6);
        }

        .view-favorites-button:active {
            transform: translateY(0);
        }

        /* Toast 提示框 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .toast.error {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        /* 收藏列表模态框遮罩 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        /* 收藏列表模态框 */
        .favorites-modal {
            background: white;
            border-radius: 20px;
            max-width: 700px;
            width: 100%;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        /* 模态框头部 */
        .modal-header {
            padding: 25px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
        }

        .close-button {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .close-button:hover {
            transform: scale(1.2);
        }

        /* 模态框内容 */
        .modal-content {
            padding: 30px;
            overflow-y: auto;
            flex: 1;
        }

        /* 收藏列表 */
        .favorites-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 收藏项 */
        .favorite-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            transition: transform 0.2s ease;
        }

        .favorite-item:hover {
            transform: translateX(5px);
        }

        .favorite-item-text {
            font-size: 16px;
            line-height: 1.6;
            color: #2d3748;
            margin-bottom: 10px;
            padding-right: 40px;
        }

        .favorite-item-author {
            font-size: 14px;
            color: #667eea;
            font-style: italic;
        }

        /* 删除按钮 */
        .delete-button {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .delete-button:hover {
            background: #dc2626;
            transform: scale(1.1);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #718096;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .empty-state-text {
            font-size: 18px;
        }

        /* 页脚信息 */
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #718096;
            font-size: 14px;
        }

        /* 响应式设计 - 平板 */
        @media (max-width: 768px) {
            .container {
                padding: 30px;
            }

            .title {
                font-size: 28px;
                margin-bottom: 30px;
            }

            .quote-container {
                padding: 30px;
            }

            .quote-text {
                font-size: 20px;
            }

            .quote-author {
                font-size: 16px;
            }
        }

        /* 响应式设计 - 手机 */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .container {
                padding: 25px;
            }

            .title {
                font-size: 24px;
                margin-bottom: 25px;
            }

            .quote-container {
                padding: 25px;
                min-height: 180px;
            }

            .quote-container::before,
            .quote-container::after {
                font-size: 40px;
            }

            .quote-text {
                font-size: 18px;
            }

            .quote-author {
                font-size: 14px;
            }

            .button-group {
                flex-direction: column;
                gap: 10px;
            }

            .refresh-button,
            .favorite-button,
            .view-favorites-button {
                padding: 10px 25px;
                font-size: 14px;
                width: 100%;
            }

            .modal-header {
                padding: 20px;
            }

            .modal-title {
                font-size: 20px;
            }

            .modal-content {
                padding: 20px;
            }

            .favorite-item {
                padding: 15px;
            }

            .favorite-item-text {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航头部 -->
    <div class="nav-header">
        <a href="../index.html" class="back-btn">
            ← 返回主页
        </a>
        <div class="nav-title">每日名言展示器</div>
    </div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 页面标题 -->
        <h1 class="title">每日名言展示</h1>

        <!-- 名言展示区域 -->
        <div class="quote-container">
            <!-- 加载状态 -->
            <div class="loading" id="loading">正在加载名言</div>
            
            <!-- 名言内容（初始隐藏） -->
            <div id="quote-content" style="display: none;">
                <p class="quote-text" id="quote-text"></p>
                <p class="quote-author" id="quote-author"></p>
            </div>
        </div>

        <!-- 刷新按钮 -->
        <div class="button-group">
            <button class="refresh-button" id="refresh-btn">🔄 换一句</button>
            <button class="favorite-button" id="favorite-btn">❤️ 收藏</button>
            <button class="view-favorites-button" id="view-favorites-btn">📚 查看收藏</button>
        </div>

        <!-- 页脚信息 -->
        <div class="footer">
            每天一句名言，启迪智慧人生
        </div>
    </div>

    <!-- Toast 提示框 -->
    <div class="toast" id="toast"></div>

    <!-- 收藏列表模态框 -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="favorites-modal">
            <div class="modal-header">
                <h2 class="modal-title">我的收藏</h2>
                <button class="close-button" id="close-modal">×</button>
            </div>
            <div class="modal-content">
                <div class="favorites-list" id="favorites-list">
                    <!-- 收藏列表将动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 获取页面元素
        const loadingElement = document.getElementById('loading');
        const quoteContent = document.getElementById('quote-content');
        const quoteText = document.getElementById('quote-text');
        const quoteAuthor = document.getElementById('quote-author');
        const refreshButton = document.getElementById('refresh-btn');
        const favoriteButton = document.getElementById('favorite-btn');
        const viewFavoritesButton = document.getElementById('view-favorites-btn');
        const modalOverlay = document.getElementById('modal-overlay');
        const closeModal = document.getElementById('close-modal');
        const favoritesList = document.getElementById('favorites-list');

            { text: "莫等闲，白了少年头，空悲切。", author: "岳飞" },
            { text: "盛年不重来，一日难再晨。", author: "陶渊明" },
            { text: "明日复明日，明日何其多。我生待明日，万事成蹉跎。", author: "钱鹤滩" },
            { text: "今日事今日毕。", author: "古训" },
            { text: "合抱之木，生于毫末；九层之台，起于累土。", author: "老子" },
            { text: "骐骥一跃，不能十步；驽马十驾，功在不舍。", author: "荀子" },
            { text: "绳锯木断，水滴石穿。", author: "罗大经" },
            { text: "冰冻三尺，非一日之寒。", author: "古训" },
            { text: "失败是成功之母。", author: "古训" },
            { text: "吃一堑，长一智。", author: "古训" },
            { text: "人无远虑，必有近忧。", author: "孔子" },
            { text: "凡事预则立，不预则废。", author: "礼记" },
            { text: "机不可失，时不再来。", author: "古训" },
            { text: "良药苦口利于病，忠言逆耳利于行。", author: "古训" },
            { text: "满招损，谦受益。", author: "尚书" },
            { text: "虚心使人进步，骄傲使人落后。", author: "毛泽东" },
            { text: "世上无难事，只怕有心人。", author: "古训" },
            { text: "有志不在年高，无志空长百岁。", author: "古训" },
            { text: "志当存高远。", author: "诸葛亮" },
            { text: "老骥伏枥，志在千里。", author: "曹操" },
            { text: "穷且益坚，不坠青云之志。", author: "王勃" },
            { text: "燕雀安知鸿鹄之志哉。", author: "司马迁" },
            { text: "不飞则已，一飞冲天；不鸣则已，一鸣惊人。", author: "司马迁" },
            { text: "人固有一死，或重于泰山，或轻于鸿毛。", author: "司马迁" },
            { text: "士不可以不弘毅，任重而道远。", author: "论语" },
            { text: "天将降大任于斯人也，必先苦其心志。", author: "孟子" },
            { text: "生于忧患，死于安乐。", author: "孟子" },
            { text: "富贵不能淫，贫贱不能移，威武不能屈。", author: "孟子" },
            { text: "人生得意须尽欢，莫使金樽空对月。", author: "李白" },
            { text: "抽刀断水水更流，举杯消愁愁更愁。", author: "李白" },
            { text: "安能摧眉折腰事权贵，使我不得开心颜。", author: "李白" },
            { text: "天生我材必有用，千金散尽还复来。", author: "李白" },
            { text: "两岸猿声啼不住，轻舟已过万重山。", author: "李白" },
            { text: "桃花潭水深千尺，不及汪伦送我情。", author: "李白" },
            { text: "孤帆远影碧空尽，唯见长江天际流。", author: "李白" }
        ];

        // 记录上一次显示的名言索引，避免连续重复
        let lastIndex = -1;

        // 获取随机名言的函数
        function getRandomQuote() {
            // 生成随机索引
            let randomIndex;
            
            // 如果只有一条名言，直接返回
            if (quotes.length === 1) {
                randomIndex = 0;
            } else {
                // 确保不会连续显示相同的名言
                do {
                    randomIndex = Math.floor(Math.random() * quotes.length);
                } while (randomIndex === lastIndex);
            }
            
            // 更新上一次的索引
            lastIndex = randomIndex;
            
            // 返回选中的名言
            return quotes[randomIndex];
        }

        // 显示名言的函数
        function displayQuote() {
            // 显示加载状态（模拟加载效果）
            loadingElement.style.display = 'block';
            quoteContent.style.display = 'none';

            // 短暂延迟后显示名言（增加真实感）
            setTimeout(() => {
                // 获取随机名言
                const quote = getRandomQuote();
                
                // 保存当前名言
                currentQuote = quote;

                // 更新页面内容
                quoteText.textContent = quote.text;
                quoteAuthor.textContent = `— ${quote.author}`;

                // 隐藏加载状态，显示名言内容
                loadingElement.style.display = 'none';
                quoteContent.style.display = 'block';
            }, 300);
        }

        // 显示 Toast 提示的函数
        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            
            // 3秒后自动隐藏
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 从 localStorage 获取收藏列表
        function getFavorites() {
            const favorites = localStorage.getItem('favoriteQuotes');
            return favorites ? JSON.parse(favorites) : [];
        }

        // 保存收藏列表到 localStorage
        function saveFavorites(favorites) {
            localStorage.setItem('favoriteQuotes', JSON.stringify(favorites));
        }

        // 检查名言是否已收藏
        function isFavorite(quote) {
            const favorites = getFavorites();
            return favorites.some(fav => fav.text === quote.text && fav.author === quote.author);
        }

        // 收藏当前名言
        function addToFavorites() {
            if (!currentQuote) {
                showToast('没有可收藏的名言', 'error');
                return;
            }

            // 检查是否已经收藏
            if (isFavorite(currentQuote)) {
                showToast('该名言已经收藏过了', 'error');
                return;
            }

            // 获取当前收藏列表
            const favorites = getFavorites();
            
            // 添加当前名言
            favorites.push({
                text: currentQuote.text,
                author: currentQuote.author,
                timestamp: Date.now()
            });

            // 保存到 localStorage
            saveFavorites(favorites);

            // 显示成功提示
            showToast('收藏成功！', 'success');
        }

        // 从收藏中删除
        function removeFromFavorites(index) {
            const favorites = getFavorites();
            favorites.splice(index, 1);
            saveFavorites(favorites);
            
            // 重新渲染收藏列表
            renderFavorites();
            
            showToast('已取消收藏', 'success');
        }

        // 渲染收藏列表
        function renderFavorites() {
            const favorites = getFavorites();
            
            // 清空列表
            favoritesList.innerHTML = '';

            // 如果没有收藏
            if (favorites.length === 0) {
                favoritesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div class="empty-state-text">还没有收藏任何名言</div>
                    </div>
                `;
                return;
            }

            // 按时间倒序排列（最新的在前面）
            favorites.reverse().forEach((quote, index) => {
                const actualIndex = favorites.length - 1 - index;
                const item = document.createElement('div');
                item.className = 'favorite-item';
                item.innerHTML = `
                    <div class="favorite-item-text">${quote.text}</div>
                    <div class="favorite-item-author">${quote.author}</div>
                    <button class="delete-button" onclick="removeFromFavorites(${actualIndex})">×</button>
                `;
                favoritesList.appendChild(item);
            });
        }

        // 页面加载时自动显示第一条名言
        displayQuote();

        // 点击刷新按钮时显示新的名言
        refreshButton.addEventListener('click', function() {
            // 添加按钮旋转动画
            refreshButton.style.transform = 'rotate(360deg)';
            refreshButton.style.transition = 'transform 0.6s ease';
            
            setTimeout(() => {
                refreshButton.style.transform = 'rotate(0deg)';
            }, 600);
            
            // 显示新的名言
            displayQuote();
        });

        // 点击收藏按钮
        favoriteButton.addEventListener('click', function() {
            addToFavorites();
        });

        // 点击查看收藏按钮
        viewFavoritesButton.addEventListener('click', function() {
            renderFavorites();
            modalOverlay.classList.add('active');
        });

        // 点击关闭按钮
        closeModal.addEventListener('click', function() {
            modalOverlay.classList.remove('active');
        });

        // 点击遮罩层关闭模态框
        modalOverlay.addEventListener('click', function(event) {
            if (event.target === modalOverlay) {
                modalOverlay.classList.remove('active');
            }
        });

        // 将 removeFromFavorites 函数暴露到全局作用域，供 HTML 中的 onclick 调用
        window.removeFromFavorites = removeFromFavorites;
    </script>
</body>
</html>
