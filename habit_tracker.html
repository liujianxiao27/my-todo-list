<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>习惯打卡器</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体样式 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 页面标题 */
        .main-title {
            text-align: center;
            color: white;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 30px;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            animation: fadeInDown 0.8s ease-out;
        }

        /* 卡片基础样式 */
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out;
        }

        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }
        .card:nth-child(4) { animation-delay: 0.3s; }

        /* 卡片标题 */
        .card-title {
            font-size: 24px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 创建习惯表单 */
        .habit-form {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 15px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
        }

        .form-input {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* 按钮样式 */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .btn-success {
            background: #48bb78;
            color: white;
            box-shadow: 0 4px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-success:hover {
            background: #38a169;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #f56565;
            color: white;
            box-shadow: 0 4px 15px rgba(245, 101, 101, 0.4);
        }

        .btn-danger:hover {
            background: #e53e3e;
            transform: translateY(-2px);
        }

        /* 习惯列表 */
        .habits-list {
            display: grid;
            gap: 20px;
        }

        .habit-item {
            background: #f7fafc;
            border-radius: 16px;
            padding: 20px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .habit-item:hover {
            border-color: #e2e8f0;
            transform: translateY(-2px);
        }

        .habit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .habit-name {
            font-size: 20px;
            font-weight: 600;
            color: #2d3748;
        }

        .habit-streak {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .habit-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .habit-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #4a5568;
        }

        .status-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .status-checked {
            background: #48bb78;
            color: white;
        }

        .status-unchecked {
            background: #e2e8f0;
            color: #a0aec0;
        }

        /* 日历视图 */
        .calendar-container {
            background: #f7fafc;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-title {
            font-size: 20px;
            font-weight: 600;
            color: #2d3748;
        }

        .calendar-nav {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: white;
            color: #4a5568;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .nav-btn:hover {
            background: #667eea;
            color: white;
            transform: scale(1.1);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .calendar-day-header {
            text-align: center;
            font-weight: 600;
            color: #4a5568;
            padding: 10px;
            font-size: 14px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .calendar-day:hover {
            background: #e2e8f0;
        }

        .calendar-day.today {
            background: #667eea;
            color: white;
        }

        .calendar-day.checked {
            background: #48bb78;
            color: white;
        }

        .calendar-day.checked::after {
            content: '✓';
            position: absolute;
            bottom: 2px;
            right: 2px;
            font-size: 10px;
        }

        .calendar-day.other-month {
            color: #a0aec0;
        }

        /* 统计信息 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #a0aec0;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-text {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .empty-hint {
            font-size: 14px;
        }

        /* 提示消息 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #48bb78;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: #f56565;
        }

        /* 动画定义 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式设计 - 平板 */
        @media (max-width: 768px) {
            .container {
                padding: 0 10px;
            }

            .main-title {
                font-size: 28px;
            }

            .card {
                padding: 20px;
            }

            .habit-form {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .habit-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .habit-actions {
                align-self: stretch;
                justify-content: space-between;
            }

            .calendar-grid {
                gap: 4px;
            }

            .calendar-day {
                font-size: 12px;
            }
        }

        /* 响应式设计 - 手机 */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .main-title {
                font-size: 24px;
            }

            .card {
                padding: 15px;
            }

            .card-title {
                font-size: 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            .stat-number {
                font-size: 24px;
            }

            .calendar-day-header {
                font-size: 12px;
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面标题 -->
        <h1 class="main-title">📊 习惯打卡器</h1>

        <!-- 创建习惯卡片 -->
        <div class="card">
            <h2 class="card-title">
                ➕ 创建新习惯
            </h2>
            <form class="habit-form" id="habitForm">
                <div class="form-group">
                    <label class="form-label">习惯名称</label>
                    <input type="text" class="form-input" id="habitName" placeholder="例如：每天阅读30分钟" maxlength="50">
                </div>
                <button type="submit" class="btn btn-primary">
                    ✨ 创建习惯
                </button>
            </form>
        </div>

        <!-- 习惯列表卡片 -->
        <div class="card">
            <h2 class="card-title">
                📋 我的习惯
            </h2>
            <div class="habits-list" id="habitsList">
                <!-- 空状态 -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">🎯</div>
                    <div class="empty-text">还没有创建任何习惯</div>
                    <div class="empty-hint">创建你的第一个习惯，开始养成好习惯的旅程吧！</div>
                </div>
            </div>

            <!-- 统计信息 -->
            <div class="stats-grid" id="statsGrid" style="display: none;">
                <div class="stat-item">
                    <div class="stat-number" id="totalHabits">0</div>
                    <div class="stat-label">总习惯数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="todayChecked">0</div>
                    <div class="stat-label">今日完成</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="longestStreak">0</div>
                    <div class="stat-label">最长连续</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="completionRate">0%</div>
                    <div class="stat-label">完成率</div>
                </div>
            </div>
        </div>

        <!-- 日历视图卡片 -->
        <div class="card" id="calendarCard" style="display: none;">
            <h2 class="card-title">
                📅 打卡日历
            </h2>
            
            <!-- 习惯选择器 -->
            <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label">选择习惯</label>
                <select class="form-input" id="habitSelector">
                    <option value="">请选择要查看的习惯</option>
                </select>
            </div>

            <!-- 日历容器 -->
            <div class="calendar-container">
                <div class="calendar-header">
                    <h3 class="calendar-title" id="calendarTitle">2024年3月</h3>
                    <div class="calendar-nav">
                        <button class="nav-btn" id="prevMonth">‹</button>
                        <button class="nav-btn" id="nextMonth">›</button>
                    </div>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <!-- 星期标题 -->
                    <div class="calendar-day-header">日</div>
                    <div class="calendar-day-header">一</div>
                    <div class="calendar-day-header">二</div>
                    <div class="calendar-day-header">三</div>
                    <div class="calendar-day-header">四</div>
                    <div class="calendar-day-header">五</div>
                    <div class="calendar-day-header">六</div>
                    
                    <!-- 日期将通过JavaScript动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <script>
        // 全局变量
        let habits = [];
        let currentDate = new Date();
        let selectedHabitId = null;

        // DOM元素
        const habitForm = document.getElementById('habitForm');
        const habitNameInput = document.getElementById('habitName');
        const habitsList = document.getElementById('habitsList');
        const emptyState = document.getElementById('emptyState');
        const statsGrid = document.getElementById('statsGrid');
        const calendarCard = document.getElementById('calendarCard');
        const habitSelector = document.getElementById('habitSelector');
        const calendarTitle = document.getElementById('calendarTitle');
        const calendarGrid = document.getElementById('calendarGrid');
        const prevMonthBtn = document.getElementById('prevMonth');
        const nextMonthBtn = document.getElementById('nextMonth');
        const toast = document.getElementById('toast');

        // 统计元素
        const totalHabitsEl = document.getElementById('totalHabits');
        const todayCheckedEl = document.getElementById('todayChecked');
        const longestStreakEl = document.getElementById('longestStreak');
        const completionRateEl = document.getElementById('completionRate');

        // 初始化应用
        function init() {
            loadHabitsFromStorage();
            renderHabits();
            updateStats();
            setupEventListeners();
            renderCalendar();
        }

        // 设置事件监听器
        function setupEventListeners() {
            habitForm.addEventListener('submit', handleCreateHabit);
            prevMonthBtn.addEventListener('click', () => changeMonth(-1));
            nextMonthBtn.addEventListener('click', () => changeMonth(1));
            habitSelector.addEventListener('change', handleHabitSelection);
        }

        // 处理创建习惯
        function handleCreateHabit(e) {
            e.preventDefault();
            const name = habitNameInput.value.trim();
            
            if (!name) {
                showToast('请输入习惯名称', 'error');
                return;
            }

            if (name.length > 50) {
                showToast('习惯名称不能超过50个字符', 'error');
                return;
            }

            // 检查是否已存在相同名称的习惯
            if (habits.some(habit => habit.name === name)) {
                showToast('该习惯已存在', 'error');
                return;
            }

            // 创建新习惯
            const newHabit = {
                id: Date.now().toString(),
                name: name,
                createdAt: new Date().toISOString(),
                checkIns: {} // 格式: { '2024-03-01': true }
            };

            habits.push(newHabit);
            saveHabitsToStorage();
            renderHabits();
            updateStats();
            updateHabitSelector();
            
            // 清空表单
            habitNameInput.value = '';
            showToast('习惯创建成功！');
        }

        // 渲染习惯列表
        function renderHabits() {
            if (habits.length === 0) {
                emptyState.style.display = 'block';
                statsGrid.style.display = 'none';
                calendarCard.style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            statsGrid.style.display = 'grid';
            calendarCard.style.display = 'block';

            const today = getTodayString();
            
            habitsList.innerHTML = habits.map(habit => {
                const streak = calculateStreak(habit);
                const isCheckedToday = habit.checkIns[today] || false;
                
                return `
                    <div class="habit-item">
                        <div class="habit-header">
                            <div class="habit-name">${habit.name}</div>
                            <div class="habit-streak">连续 ${streak} 天</div>
                        </div>
                        <div class="habit-actions">
                            <div class="habit-status">
                                <div class="status-icon ${isCheckedToday ? 'status-checked' : 'status-unchecked'}">
                                    ${isCheckedToday ? '✓' : '○'}
                                </div>
                                <span>今日${isCheckedToday ? '已完成' : '未完成'}</span>
                            </div>
                            <div style="display: flex; gap: 10px;">
                                <button class="btn ${isCheckedToday ? 'btn-danger' : 'btn-success'}" 
                                        onclick="${isCheckedToday ? 'uncheckHabit' : 'checkHabit'}('${habit.id}')">
                                    ${isCheckedToday ? '取消打卡' : '今日打卡'}
                                </button>
                                <button class="btn btn-danger" onclick="deleteHabit('${habit.id}')">
                                    删除
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            updateHabitSelector();
        }

        // 打卡习惯
        function checkHabit(habitId) {
            const habit = habits.find(h => h.id === habitId);
            if (!habit) return;

            const today = getTodayString();
            habit.checkIns[today] = true;
            
            saveHabitsToStorage();
            renderHabits();
            updateStats();
            renderCalendar();
            showToast('打卡成功！继续保持！');
        }

        // 取消打卡
        function uncheckHabit(habitId) {
            const habit = habits.find(h => h.id === habitId);
            if (!habit) return;

            const today = getTodayString();
            delete habit.checkIns[today];
            
            saveHabitsToStorage();
            renderHabits();
            updateStats();
            renderCalendar();
            showToast('已取消今日打卡');
        }

        // 删除习惯
        function deleteHabit(habitId) {
            if (!confirm('确定要删除这个习惯吗？删除后无法恢复。')) {
                return;
            }

            habits = habits.filter(h => h.id !== habitId);
            saveHabitsToStorage();
            renderHabits();
            updateStats();
            renderCalendar();
            showToast('习惯已删除');
        }

        // 计算连续打卡天数
        function calculateStreak(habit) {
            const today = new Date();
            let streak = 0;
            let currentDate = new Date(today);

            while (true) {
                const dateString = getDateString(currentDate);
                if (habit.checkIns[dateString]) {
                    streak++;
                    currentDate.setDate(currentDate.getDate() - 1);
                } else {
                    break;
                }
            }

            return streak;
        }

        // 更新统计信息
        function updateStats() {
            const today = getTodayString();
            const todayChecked = habits.filter(habit => habit.checkIns[today]).length;
            const longestStreak = Math.max(0, ...habits.map(calculateStreak));
            
            // 计算完成率（最近30天）
            let totalDays = 0;
            let completedDays = 0;
            
            for (let i = 0; i < 30; i++) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const dateString = getDateString(date);
                
                habits.forEach(habit => {
                    // 只计算习惯创建后的天数
                    const createdDate = new Date(habit.createdAt);
                    if (date >= createdDate) {
                        totalDays++;
                        if (habit.checkIns[dateString]) {
                            completedDays++;
                        }
                    }
                });
            }
            
            const completionRate = totalDays > 0 ? Math.round((completedDays / totalDays) * 100) : 0;

            totalHabitsEl.textContent = habits.length;
            todayCheckedEl.textContent = todayChecked;
            longestStreakEl.textContent = longestStreak;
            completionRateEl.textContent = completionRate + '%';
        }

        // 更新习惯选择器
        function updateHabitSelector() {
            habitSelector.innerHTML = '<option value="">请选择要查看的习惯</option>' +
                habits.map(habit => `<option value="${habit.id}">${habit.name}</option>`).join('');
        }

        // 处理习惯选择
        function handleHabitSelection(e) {
            selectedHabitId = e.target.value;
            renderCalendar();
        }

        // 渲染日历
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            calendarTitle.textContent = `${year}年${month + 1}月`;
            
            // 清除现有日期（保留星期标题）
            const dayHeaders = calendarGrid.querySelectorAll('.calendar-day-header');
            calendarGrid.innerHTML = '';
            dayHeaders.forEach(header => calendarGrid.appendChild(header));
            
            // 获取当月第一天和最后一天
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - firstDay.getDay());
            
            // 生成42天（6周）
            for (let i = 0; i < 42; i++) {
                const date = new Date(startDate);
                date.setDate(startDate.getDate() + i);
                
                const dayElement = document.createElement('div');
                dayElement.className = 'calendar-day';
                dayElement.textContent = date.getDate();
                
                // 添加样式类
                if (date.getMonth() !== month) {
                    dayElement.classList.add('other-month');
                }
                
                if (isToday(date)) {
                    dayElement.classList.add('today');
                }
                
                // 如果选择了习惯，显示打卡状态
                if (selectedHabitId) {
                    const habit = habits.find(h => h.id === selectedHabitId);
                    if (habit) {
                        const dateString = getDateString(date);
                        if (habit.checkIns[dateString]) {
                            dayElement.classList.add('checked');
                        }
                    }
                }
                
                calendarGrid.appendChild(dayElement);
            }
        }

        // 切换月份
        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }

        // 工具函数
        function getTodayString() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getDateString(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function isToday(date) {
            const today = new Date();
            return date.toDateString() === today.toDateString();
        }

        // 显示提示消息
        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 数据持久化
        function saveHabitsToStorage() {
            localStorage.setItem('habitTracker_habits', JSON.stringify(habits));
        }

        function loadHabitsFromStorage() {
            const stored = localStorage.getItem('habitTracker_habits');
            if (stored) {
                try {
                    habits = JSON.parse(stored);
                } catch (e) {
                    console.error('加载习惯数据失败:', e);
                    habits = [];
                }
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
